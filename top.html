<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadPass Pro</title>
    <meta name="description" content="ReadPass Pro — 英検リーディング指導者向け練習・分析ツール">
    <link rel="stylesheet" href="top.css">
</head>

<body>
    <div class="app-container">

        <!-- Hero Section -->
        <header class="hero">
            <div class="hero-bg"></div>
            <div class="hero-content">
                <div class="hero-badge">READING PRACTICE</div>
                <h1 class="hero-title">ReadPass Pro</h1>
                <p class="hero-description">英検リーディング過去問を文法解析・単語学習付きで演習</p>
            </div>
        </header>

        <!-- Grade Selection -->
        <main class="main-content">
            <section class="section" id="gradeSection">
                <div class="section-header">
                    <h2 class="section-title">レベルを選択</h2>
                    <p class="section-subtitle">学習したいレベルを選んでください</p>
                </div>
                <div class="grade-grid" id="gradeGrid"></div>
            </section>

            <!-- Exam Selection (hidden initially) -->
            <section class="section exam-section hidden" id="examSection">
                <div class="section-header">
                    <button class="breadcrumb-back" id="backToGrades">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
                        </svg>
                        レベル選択に戻る
                    </button>
                    <h2 class="section-title" id="examSectionTitle">試験を選択</h2>
                    <p class="section-subtitle">実施年度と回を選んでください</p>
                </div>
                <div class="exam-list" id="examList"></div>
                <div class="no-exams hidden" id="noExams">
                    <div class="no-exams-icon">📋</div>
                    <p>この級のデータはまだ準備中です</p>
                    <p class="no-exams-sub">今後追加予定です。しばらくお待ちください。</p>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <div style="text-align:center;margin-top:40px;margin-bottom:8px">
            <a href="guide.html"
                style="display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:12px;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.25);color:#818cf8;font-weight:600;font-size:14px;text-decoration:none;transition:all .2s"
                onmouseover="this.style.background='rgba(99,102,241,.2)';this.style.transform='translateY(-2px)'"
                onmouseout="this.style.background='rgba(99,102,241,.12)';this.style.transform='none'">
                📖 使い方ガイド
            </a>
        </div>
        <footer class="footer">
            <p>ReadPass Pro — Reading Practice</p>
        </footer>
    </div>

    <script src="top.js"></script>
</body>

</html>
